<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Arial', sans-serif; }
body {
    /* Add this line */
    touch-action: manipulation; 
}
        #game-container { 
            width: 100vw; height: 100vh; 
            background: url('garmin sideword (7).png') no-repeat center center/cover;
            position: relative; overflow: hidden;
        }
        #sentence-box {
            position: absolute; top: 5%; left: 10%; width: 80%; height: 12%;
            background: white; border: 4px solid #FF8C00; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5vw; font-weight: bold; color: #333; padding: 0 20px;
        }
        .highlight { color: #28a745; text-decoration: underline; }
        .word { 
    position: absolute; 
    font-size: 4vw;
    font-weight: bold; 
    background: #FFD700; 
    padding: 20px 40px; 
    border-radius: 20px;
    cursor: pointer; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    white-space: nowrap;
    /* Remove display: flex and alignment to prevent layout locking */
    z-index: 5;
    transition: transform 0.1s;
}

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
            z-index: 10; color: white; font-size: 5vw; cursor: pointer;
        }

    </style>
</head>
<body>

<div id="game-container">
    <div id="overlay" onclick="startGame()">PRESS TO START MISSION</div>
    <div id="sentence-box">Mission Loading...</div>
<button onclick="window.location.href='index.html'" style="position:absolute; top: 10px; left: 10px;">Back to Mission 1</button>
    <button id="resetBtn" onclick="resetGame()" style="display:none; position:absolute; top: 60%; left: 45%; font-size: 2vw; padding: 10px 20px;">Play Again</button>
    <audio id="bgMusic" loop>
        <source src="game.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    const FALL_SPEED = 0.4;
    const SPAWN_RATE = 2000;

    const levels = [
        { sent: "CL_P (ตัดออก)", ans: "I", full: "CLIP(ตัดออก)" },
        { sent: "SL_P (ลื่น)", ans: "I", full: "SLIP(ลื่น)" },
        { sent: "FL_G (ธง)", ans: "A", full: "FLAG(ธง)" },
        { sent: "BL_CK (สีดำ)", ans: "A", full: "BLACK(สีดำ)" },
        { sent: "PLA_ (แผนการ)", ans: "N", full: "PLAN(แผนการ)" },
        { sent: "B_ (เป็น)", ans: "E", full: "BE(เป็น)" },
        { sent: "F_IP (พลิก)", ans: "L", full: "FLIP(พลิก)" },
        { sent: "CO_E (มา)", ans: "M", full: "COME(มา)" },
        { sent: "GOO_ (ดี)", ans: "D", full: "GOOD(ดี)" },
        { sent: "P_LL (ดึง)", ans: "U", full: "PULL(ดึง)" }
    ];
    
    let currentLevel = 0;
    let gameStarted = false;
    let isSpeaking = false; 

    function speak(text, callback) {
        window.speechSynthesis.cancel();
        isSpeaking = true;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.9;
        msg.onend = () => { isSpeaking = false; if (callback) callback(); };
        window.speechSynthesis.speak(msg);
    }

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        const music = document.getElementById('bgMusic');
        music.play().catch(e => console.log("Music blocked"));
        gameStarted = true;
        updateSentence();
        setInterval(spawnWord, SPAWN_RATE);
    }

    function updateSentence() {
        if (currentLevel >= levels.length) return;
        document.getElementById('sentence-box').innerHTML = levels[currentLevel].sent;
    }

    function spawnWord() {
        if (!gameStarted) return;
        const letters = ["A", "I", "U", "E", "N", "L", "M", "D"]; 
        const letterDiv = document.createElement('div');
        letterDiv.className = 'word';
        letterDiv.innerText = letters[Math.floor(Math.random() * letters.length)];
        letterDiv.style.left = Math.random() * 60 + 10 + "%"; 
        letterDiv.style.top = "-10%";
        
        // Mobile-ready interaction
        letterDiv.addEventListener('mousedown', function() { check(this); });
        letterDiv.addEventListener('touchstart', function(e) { 
            e.stopPropagation(); // Stops the tap from accidentally hitting the background
            check(this); 
        });
        
        document.getElementById('game-container').appendChild(letterDiv);
        
        let pos = -10;
        let fall = setInterval(() => {
            if (!gameStarted) { clearInterval(fall); return; }
            pos += FALL_SPEED; 
            letterDiv.style.top = pos + "%";
            if (pos > 100) { clearInterval(fall); letterDiv.remove(); }
        }, 20);
    }

    function check(el) {
        if (el.innerText === levels[currentLevel].ans) {
            document.getElementById('sentence-box').innerHTML = levels[currentLevel].full;
            el.style.background = "#28a745";
            speak("Correct! " + levels[currentLevel].full, () => {
                currentLevel++;
                if (currentLevel < levels.length) {
                    updateSentence();
                } else {
                    speak("Mission Complete! Gamin is a Hero!");
                    document.getElementById('resetBtn').style.display = 'block';
                }
            });
        }
    }

    function resetGame() { location.reload(); }
</script>
</body>
</html>
