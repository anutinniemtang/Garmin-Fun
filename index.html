<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Arial', sans-serif; }
body {
    /* Add this line */
    touch-action: manipulation; 
}
        #game-container { 
            width: 100vw; height: 100vh; 
            background: url('garmin sideword (7).png') no-repeat center center/cover;
            position: relative; overflow: hidden;
        }
        #sentence-box {
            position: absolute; top: 5%; left: 10%; width: 80%; height: 12%;
            background: white; border: 4px solid #FF8C00; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5vw; font-weight: bold; color: #333; padding: 0 20px;
        }
        .highlight { color: #28a745; text-decoration: underline; }
        .word { 
    position: absolute; 
    font-size: 4vw;
    font-weight: bold; 
    background: #FFD700; 
    padding: 20px 40px; 
    border-radius: 20px;
    cursor: pointer; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    white-space: nowrap;
    /* Remove display: flex and alignment to prevent layout locking */
    z-index: 5;
    transition: transform 0.1s;
}

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
            z-index: 10; color: white; font-size: 5vw; cursor: pointer;
        }

    </style>
</head>
<body>

<div id="game-container">
        <div id="overlay" onclick="startGame()">PRESS TO START MISSION</div>
        <div id="sentence-box">Mission Loading...</div>
        
        <button id="resetBtn" onclick="resetGame()" style="display:none; position:absolute; top: 60%; left: 45%; font-size: 2vw; padding: 10px 20px; z-index: 20;">Start Mission 2</button>
        
        <audio id="bgMusic" loop>
            <source src="game.mp3" type="audio/mpeg">
        </audio>
    </div>

<script>
    const FALL_SPEED = 0.4;
    const SPAWN_RATE = 2000;

    const levels = [
        { sent: "Gamin wants to ___ a superstar.", ans: "be" },
        { sent: "Please ___ here.", ans: "come" },
        { sent: "She is a ___ friend.", ans: "good" },
        { sent: "___ the door open.", ans: "pull" },
        { sent: "Football is a ___ sport.", ans: "popular" }
    ];
    
    let currentLevel = 0;
    let gameStarted = false;
    let isSpeaking = false; 

    function speak(text, callback) {
        window.speechSynthesis.cancel();
        isSpeaking = true;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.9;
        
        msg.onend = () => { 
            isSpeaking = false; 
            if (callback) callback(); 
        };
        
        window.speechSynthesis.speak(msg);
    }

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        const music = document.getElementById('bgMusic');
        music.volume = 0.3; 
        music.play().catch(e => console.log("Music blocked"));
        
        gameStarted = true;
        updateSentence();
        setInterval(spawnWord, SPAWN_RATE);
    }

    function updateSentence() {
        if (currentLevel >= levels.length) return;
        const s = levels[currentLevel].sent;
        document.getElementById('sentence-box').innerHTML = s;
        let textToRead = s.replace("___", ""); 
        speak(textToRead);
    }

    function spawnWord() {
        if (!gameStarted) return;
        const words = ["be", "come", "good", "pull", "popular"];
        const word = document.createElement('div');
        word.className = 'word';
        word.innerText = words[Math.floor(Math.random() * words.length)];
        word.style.left = Math.random() * 60 + 10 + "%"; 
        word.style.top = "-10%";
        
        word.addEventListener('mousedown', function() { check(this); });
        word.addEventListener('touchstart', function(e) { 
            e.stopPropagation(); 
            check(this); 
        });
        
        document.getElementById('game-container').appendChild(word);
        
        let pos = -10;
        let fall = setInterval(() => {
            if (!gameStarted) { clearInterval(fall); return; }
            pos += FALL_SPEED; 
            word.style.top = pos + "%";
            if (pos > 100) { 
                clearInterval(fall); 
                word.remove(); 
            }
        }, 20);
    }

   function check(el) {
        if (el.innerText === levels[currentLevel].ans) {
            const fullSentence = levels[currentLevel].sent.replace("___", el.innerText);
            const s = levels[currentLevel].sent.replace("___", `<span class="highlight">${el.innerText}</span>`);
            document.getElementById('sentence-box').innerHTML = s;
            el.style.background = "#28a745";
            
            speak("Correct! " + fullSentence, () => {
                setTimeout(() => {
                    currentLevel++;
                    if (currentLevel < levels.length) {
                        updateSentence();
                    } else {
                        // FORCE SHOW LOGIC
                        console.log("Mission Complete - Showing Button");
                        speak("Mission Complete! Gamin is a Hero!");
                        const nextBtn = document.getElementById('resetBtn');
                        nextBtn.style.display = 'block'; // Make it visible
                        nextBtn.style.zIndex = '999';    // Put it on top
                        nextBtn.innerText = "Start Mission 2";
                        nextBtn.onclick = function() { window.location.href = 'game2.html'; };
                    }
                }, 1000);
            });
        }
    }

    function resetGame() {
        location.reload(); 
    }
</script></body>
</html>
